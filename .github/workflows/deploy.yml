name: 'Test and Deploy Resume'

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write # Required for requesting the JWT (OIDC)
  contents: read  # Required for actions/checkout

jobs:
  test:
    name: 'Python Unit Tests'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r tests/requirements.txt

      - name: Run Tests
        run: |
          pytest tests/test_lambda.py

  terraform:
    name: 'Terraform Deploy'
    needs: test # Only runs if Python tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::877231425838:role/cloudresumechallenge-devops
          aws-region: us-east-1 # Change to your region

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false